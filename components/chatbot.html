<!-- Chatbot -->
<button id="chat-toggle" class="chat-toggle" aria-label="Abrir chat">💬</button>

<div class="chatbot" id="chatbot">
    
    <header class="chatbot-header">
        <span>Liberdade 🗽</span>
        <button id="close-chat" class="chat-close" aria-label="Fechar chat">✕</button>
    </header>

    <div class="chatbot-messages" id="messages" role="log" aria-live="polite"></div>

    <div class="chatbot-input">
        <input type="text" id="user-input" placeholder="Digite aqui..." disabled />
        <button id="send-btn" disabled>Enviar</button>
    </div>

</div>
<!-- / Chatbot -->
